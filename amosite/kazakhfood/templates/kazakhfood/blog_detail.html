{% extends 'kazakhfood/base.html' %}
{% load static %}

{% block title %}{{ post.title }}{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/blog.css' %}">
{% endblock %}

{% block content %}

<h1>{{ post.title }}</h1>

{% for image in post.images.all %}
    <img src="{{ image.image.url }}" alt="{{ post.title }}" style="max-width:500px;">
{% endfor %}

<p>{{ post.content }}</p>

<a href="{% url 'blog' %}">Вернуться к списку статей</a>

{% endblock %}
