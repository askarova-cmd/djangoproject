{% load static %}
<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}My Restaurant{% endblock %}</title>

    <!-- Bootstrap -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
    <!-- Главный CSS -->
    <link rel="stylesheet" href="{% static 'kazakhfood/css/kazakhfood.css' %}">
</head>
<body>

    <!-- Левая панель навигации -->
    <aside class="sidebar">
        <img src="{% static 'kazakhfood/img/logo_simple.png' %}" alt="Лого" class="logo-img">
        <span class="logo-text">SӘTTI</span>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Главная</a></li>
            <li><a href="{% url 'about' %}">О нас</a></li>
            <li><a href="{% url 'menu' %}">Меню</a></li>
            <li><a href="{% url 'blog' %}">Блог</a></li>
            <li><a href="{% url 'contacts' %}">Контакты</a></li>
        </ul>
    </aside>

    <!-- Основной контент -->
    <main class="main-content">
        <!-- Верхний правый блок -->
        <div class="top-right">
            <a href="{% url 'login' %}">Вход</a> | <a href="{% url 'register' %}">Регистрация</a>
        </div>

        <!-- Контент страницы -->
        <div class="center-content">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
